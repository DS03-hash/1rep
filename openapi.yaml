openapi: 3.0.3
info:
  title: Task API
  version: 1.0.0
paths:
  /tasks:
    get:
      operationId: listTasks
      summary: List tasks
      responses:
        "200":
          description: Tasks list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTasksResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createTask
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTaskResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /tasks/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          minimum: 1
    patch:
      operationId: patchTask
      summary: Patch task by id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchTaskRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchTaskResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTask
      summary: Delete task by id
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    Task:
      type: object
      required:
        - id
        - task
        - is_done
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
        task:
          type: string
        is_done:
          type: boolean
    CreateTaskRequest:
      type: object
      required:
        - task
        - is_done
      properties:
        task:
          type: string
        is_done:
          type: boolean
    PatchTaskRequest:
      type: object
      properties:
        task:
          type: string
        is_done:
          type: boolean
    CreateTaskResponse:
      $ref: "#/components/schemas/Task"
    PatchTaskResponse:
      $ref: "#/components/schemas/Task"
    ListTasksResponse:
      type: array
      items:
        $ref: "#/components/schemas/Task"
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
